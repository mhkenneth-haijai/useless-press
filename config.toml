baseURL = "https://mhkenneth-haijai.github.io/useless-press/"
title = "Useless Press"
description = "A periodical for the curious and the uncommitted."
languageCode = "en-us"
defaultContentLanguage = "en"

# Theme: Use the noop theme placeholder (real layouts come from /layouts)
theme = "noop"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
  [markup.highlight]
    noClasses = false

[params]
  author = "Haijai"
  subtitle = "A periodical for the curious and the uncommitted."
  issuesPerYear = "~26"
  cadence = "Twice weekly — Monday & Friday"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  page = ["HTML"]

[services]
  [services.rss]
    limit = 26

disableKinds = ["taxonomy", "term"]
